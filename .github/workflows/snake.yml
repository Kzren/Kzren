name: generate-snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      # 1. Get the current Unix timestamp
      - name: Get current time
        id: date
        run: echo "TIMESTAMP=$(date +%s)" >> $GITHUB_ENV

      # 2. Generates the snake
      - name: generate-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Optional: Rename files to include the timestamp
      # This will result in files like github-snake-1710654875.svg
      - name: Rename files with timestamp
        run: |
          mv dist/github-snake.svg dist/github-snake-${{ env.TIMESTAMP }}.svg
          mv dist/github-snake-dark.svg dist/github-snake-dark-${{ env.TIMESTAMP }}.svg

      # 4. Push to output branch with the timestamp in the commit message
      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
          commit_message: "Update snake animations - Unix: ${{ env.TIMESTAMP }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
