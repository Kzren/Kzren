name: generate-snake

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current time
        run: echo "NOW=$(date +%s)" >> $GITHUB_ENV

      - name: generate-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README with new timestamp
        run: |
          sed -i "s|github-snake-dark.svg\(\?time=[0-9]*\)\?|github-snake-dark.svg?time=${{ env.NOW }}|g" README.md
          sed -i "s|github-snake.svg\(\?time=[0-9]*\)\?|github-snake.svg?time=${{ env.NOW }}|g" README.md
          
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          git commit -m "docs: update snake timestamp to ${{ env.NOW }}" || echo "No changes to commit"
          git push origin main

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
          commit_message: "Update snake animations - Unix: ${{ env.NOW }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
