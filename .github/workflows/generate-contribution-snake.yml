name: 🐍 Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"    # Daily at midnight UTC
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  generate-snake:
    name: Generate Contribution Snake
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Generate snake SVGs from contribution graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Verify SVGs were generated
        run: |
          echo "── Generated files ──────────────────────────"
          ls -lh dist/
          echo "─────────────────────────────────────────────"

          if [[ ! -f dist/github-snake.svg ]]; then
            echo "❌ ERROR: github-snake.svg not found"
            exit 1
          fi

          if [[ ! -f dist/github-snake-dark.svg ]]; then
            echo "❌ ERROR: github-snake-dark.svg not found"
            exit 1
          fi

          echo "✅ Both SVGs generated successfully"

      - name: 🚀 Deploy SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
          commit_message: "chore: regenerate contribution snake 🐍"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🕐 Update README cache-busting timestamp
        run: |
          NOW=$(date +%s)
          echo "Timestamp: $NOW"

          # Update ?t= param on both snake URLs in README
          sed -i -E "s|(github-snake\.svg)(\?t=[0-9]+)?|\1?t=$NOW|g" README.md
          sed -i -E "s|(github-snake-dark\.svg)(\?t=[0-9]+)?|\1?t=$NOW|g" README.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --staged --quiet; then
            echo "No README changes, skipping commit."
          else
            git commit -m "chore: bust snake cache [t=$NOW]"
            git push origin main
          fi
