name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"    # Daily at midnight UTC
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  generate-snake:
    name: Generate Contribution Snake
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Generate snake SVGs from contribution graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Verify SVGs were generated
        run: |
          echo "── Generated files ──────────────────────────"
          ls -lh dist/
          echo "─────────────────────────────────────────────"

          if [[ ! -f dist/github-snake.svg ]]; then
            echo "❌ ERROR: github-snake.svg not found"
            exit 1
          fi

          if [[ ! -f dist/github-snake-dark.svg ]]; then
            echo "❌ ERROR: github-snake-dark.svg not found"
            exit 1
          fi

          echo "✅ Both SVGs generated successfully"

      - name: 🚀 Deploy SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
          commit_message: "chore: regenerate contribution snake 🐍"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🕐 Update README with username and cache-busting timestamp
        env:
          USERNAME: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
        run: |
          NOW=$(date +%s)
          echo "Timestamp : $NOW"
          echo "Username  : $USERNAME"
          echo "Repo      : $REPO"

          BASE_URL="https://raw.githubusercontent.com/$USERNAME/$USERNAME/output"

          DARK_URL="$BASE_URL/github-snake-dark.svg?t=$NOW"
          LIGHT_URL="$BASE_URL/github-snake.svg?t=$NOW"

          # Build the full picture block
          SNAKE_BLOCK="## 🐍 Contribution Snake\n\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\"  srcset=\"$DARK_URL\" />\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"$LIGHT_URL\" />\n  <img alt=\"GitHub contribution snake animation\" src=\"$LIGHT_URL\" />\n</picture>"

          # If the snake block already exists in README, replace it entirely
          # If it doesn't exist, append it to the end
          if grep -q "github-snake" README.md; then
            # Replace everything between the snake heading and closing </picture> tag
            perl -i -0777 -pe "s|## 🐍 Contribution Snake.*?</picture>|$SNAKE_BLOCK|gs" README.md
          else
            echo "" >> README.md
            echo "" >> README.md
            printf "$SNAKE_BLOCK" >> README.md
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --staged --quiet; then
            echo "No README changes, skipping commit."
          else
            git commit -m "chore: update snake block and bust cache [t=$NOW]"
            git push origin main
          fi
