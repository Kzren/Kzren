name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  generate-snake:
    name: Generate Contribution Snake
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Generate snake SVGs from contribution graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Verify SVGs were generated
        run: |
          echo "── Generated files ──────────────────────────"
          ls -lh dist/
          echo "─────────────────────────────────────────────"

          if [[ ! -f dist/github-snake.svg ]]; then
            echo "❌ ERROR: github-snake.svg not found"
            exit 1
          fi

          if [[ ! -f dist/github-snake-dark.svg ]]; then
            echo "❌ ERROR: github-snake-dark.svg not found"
            exit 1
          fi

          echo "✅ Both SVGs generated successfully"

      - name: 🚀 Deploy SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
          commit_message: "chore: regenerate contribution snake 🐍"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🕐 Update README with cache-busting timestamp
        env:
          USERNAME: ${{ github.repository_owner }}
        run: |
          NOW=$(date +%s)
          echo "Timestamp : $NOW"
          echo "Username  : $USERNAME"

          BASE_URL="https://raw.githubusercontent.com/$USERNAME/$USERNAME/output"

          LIGHT_URL="$BASE_URL/github-snake.svg?t=$NOW"
          DARK_URL="$BASE_URL/github-snake-dark.svg?t=$NOW"

          # Proper <picture> tag — dark mode gets dark SVG, light mode gets light SVG
          SNAKE_BLOCK='<picture>\n  <source media="(prefers-color-scheme: dark)" srcset="'"$DARK_URL"'" />\n  <source media="(prefers-color-scheme: light)" srcset="'"$LIGHT_URL"'" />\n  <img alt="GitHub contribution snake animation" src="'"$LIGHT_URL"'" />\n</picture>'

          if grep -q "github-snake" README.md; then
            # Replace the existing <picture> block
            perl -i -0777 -pe 's|<picture>.*?</picture>|'"$SNAKE_BLOCK"'|gs' README.md
          else
            # Prepend to the very top of README
            CURRENT=$(cat README.md)
            printf "$SNAKE_BLOCK\n\n$CURRENT" > README.md
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --staged --quiet; then
            echo "No README changes, skipping commit."
          else
            git commit -m "chore: update snake and bust cache [t=$NOW]"
            git push origin main
          fi
