name: 🐍 Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"    # Runs daily at midnight UTC — perfect since contributions update daily
  workflow_dispatch:         # Manual trigger from the Actions tab anytime
  push:
    branches:
      - main

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  generate-snake:
    name: Generate Contribution Snake
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Generate snake SVGs from contribution graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Verify SVGs were generated
        run: |
          echo "── Generated files ──────────────────────────"
          ls -lh dist/
          echo "─────────────────────────────────────────────"

          if [[ ! -f dist/github-snake.svg ]]; then
            echo "❌ ERROR: github-snake.svg not found"
            exit 1
          fi

          if [[ ! -f dist/github-snake-dark.svg ]]; then
            echo "❌ ERROR: github-snake-dark.svg not found"
            exit 1
          fi

          echo "✅ Both SVGs generated successfully"

      - name: 🚀 Deploy SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
          commit_message: "chore: regenerate contribution snake 🐍"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
